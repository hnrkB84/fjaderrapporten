<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyhet – Fågelkollen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="masthead">
    <div class="masthead-eyebrow">Artportalen · Småland · Högland</div>
    <h1>Fågel<em>kollen</em></h1>
    <div class="masthead-rule"></div>
    <div class="masthead-tagline">Nyheter &amp; tips</div>
  </header>

  <nav>
    <a href="index.html">🏠 Hem</a>
    <a href="aretslista.html">📋 Årets arter</a>
    <a href="info.html">ℹ️ Om</a>
  </nav>

  <main>
    <article class="nyhet" id="nyhetsartikel">
      <div class="loading-state">Laddar nyhet…</div>
    </article>
  </main>

  <footer>
    <div>&copy; 2025 Fågelkollen &nbsp;·&nbsp; Data via <a href="https://www.artportalen.se/" target="_blank" rel="noopener">Artportalen</a></div>
    <div class="footer-sub">Naturen är alltid nära.</div>
  </footer>

  <script>
    function getQueryParam(param) {
      return new URLSearchParams(window.location.search).get(param);
    }

    async function hamtaNyhet() {
      const id = getQueryParam("id");
      const artikel = document.getElementById("nyhetsartikel");

      if (!id) {
        artikel.innerHTML = "<p>Ingen nyhet angiven.</p>";
        return;
      }

      try {
        const res     = await fetch("data/nyhet_detalj.json");
        const nyheter = await res.json();
        const nyhet   = nyheter.find(n => n.id == id);

        if (!nyhet) {
          artikel.innerHTML = "<p>Nyheten hittades inte.</p>";
          return;
        }

        document.title = `${nyhet.titel} – Fågelkollen`;
        artikel.innerHTML = `
          <h1>${nyhet.titel}</h1>
          <div class="datum">${nyhet.datum}</div>
          ${nyhet.text}
        `;
      } catch (err) {
        console.error(err);
        artikel.innerHTML = "<p>Kunde inte ladda nyheten.</p>";
      }
    }

    window.addEventListener("DOMContentLoaded", hamtaNyhet);
  </script>
</body>
</html>
