<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Årets arter – Fågelkollen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ─── ARTLISTA-SPECIFIKT ────────────────── */
    .arslista-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .arslista-titel {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--forest);
    }

    .arslista-antal {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sage);
    }

    /* ─── ARTRAD ────────────────────────────── */
    .art-rad {
      display: grid;
      grid-template-columns: 2rem 1fr auto;
      align-items: center;
      gap: 0 1rem;
      padding: 0.75rem 1.1rem;
      background-color: var(--warm-white);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 4px;
      margin-bottom: 2px;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.3s ease both;
    }

    .art-rad:hover {
      border-color: rgba(58,99,71,0.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      z-index: 1;
      position: relative;
    }

    .art-nummer {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 700;
      color: #ccc;
      text-align: right;
      letter-spacing: 0.05em;
    }

    .art-namn-wrap {
      min-width: 0;
    }

    .art-namn {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .art-lat {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.75rem;
      color: #bbb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .art-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2rem;
      flex-shrink: 0;
    }

    .art-datum {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: #888;
      white-space: nowrap;
    }

    .art-plats {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      color: #bbb;
      white-space: nowrap;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }

    .art-kommune-pill {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--moss);
      background-color: rgba(58,99,71,0.1);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }

    /* ─── NY ART-BADGE (visar om arten är ny för dagen) ── */
    .art-ny-badge {
      display: inline-block;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background-color: rgba(193,127,59,0.12);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* ─── STATISTIKRAD ──────────────────────── */
    .statistik-rad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }

    .statistik-kort {
      background-color: var(--warm-white);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 4px;
      padding: 1rem 1.1rem;
      text-align: center;
    }

    .statistik-siffra {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--forest);
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .statistik-label {
      font-family: var(--font-sans);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }

    /* ─── RESPONSIVITET ─────────────────────── */
    @media (max-width: 520px) {
      .art-rad {
        grid-template-columns: 1.6rem 1fr auto;
        padding: 0.65rem 0.85rem;
        gap: 0 0.7rem;
      }

      .art-namn { font-size: 0.95rem; }

      .art-plats { max-width: 90px; }

      .statistik-siffra { font-size: 1.4rem; }

      .statistik-kort { padding: 0.75rem 0.6rem; }
    }
  </style>
</head>
<body>

  <header class="masthead">
    <div class="masthead-eyebrow">Artportalen · Småland · Högland</div>
    <h1>Fågel<em>kollen</em></h1>
    <div class="masthead-rule"></div>
    <div class="masthead-tagline">Årets arter</div>
  </header>

  <nav>
    <a href="index.html">🏠 Hem</a>
    <a href="aretslista.html">📋 Årets arter</a>
    <a href="info.html">ℹ️ Om</a>
  </nav>

  <div class="issue-line">
    <span>UNIKA ARTER SEDDA <span id="ar-label">2026</span></span>
    <span id="issue-date">—</span>
  </div>

  <main>
    <div id="arslista-innehall">
      <div class="loading-state">Laddar artlista…</div>
    </div>
  </main>

  <footer>
    <div>&copy; 2025 Fågelkollen &nbsp;·&nbsp; Data via <a href="https://www.artportalen.se/" target="_blank" rel="noopener">Artportalen</a></div>
    <div class="footer-sub">Naturen är alltid nära.</div>
  </footer>

  <script>
    const AR = 2026;

    document.getElementById("ar-label").textContent = AR;
    document.getElementById("issue-date").textContent =
      new Date().toLocaleDateString("sv-SE", { day: "numeric", month: "long", year: "numeric" }).toUpperCase();

    // Kollar om en observation är ny (sedd idag eller igår)
    function arNy(datum) {
      const nu   = new Date();
      const obs  = new Date(datum);
      const diff = (nu - obs) / (1000 * 60 * 60 * 24);
      return diff < 2;
    }

    async function byggArslista() {
      const container = document.getElementById("arslista-innehall");

      let data;
      try {
        const res = await fetch("data/fagelfynd.json");
        data = await res.json();
      } catch (e) {
        container.innerHTML = `<div class="loading-state">Kunde inte ladda data.</div>`;
        return;
      }

      // Filtrera på år
      const obs2026 = data.filter(obs => {
        return new Date(obs.datum).getFullYear() === AR;
      });

      // Deduplicera per art — behåll senast sedd
      const artMap = {};
      for (const obs of obs2026) {
        const key = obs.scientificName || obs.art;
        if (!artMap[key] || new Date(obs.datum) > new Date(artMap[key].datum)) {
          artMap[key] = obs;
        }
      }

      // Sortera på datum, nyaste först
      const unikaArter = Object.values(artMap);
      unikaArter.sort((a, b) => new Date(b.datum) - new Date(a.datum));

      // Statistik
      const kommunSet = new Set(obs2026.map(o => o.kommun).filter(Boolean));
      const senastObs = unikaArter[0];
      const senastDatum = senastObs
        ? new Date(senastObs.datum).toLocaleDateString("sv-SE", { day: "numeric", month: "short" })
        : "—";

      container.innerHTML = "";

      // Statistikkort
      const statRad = document.createElement("div");
      statRad.className = "statistik-rad";
      statRad.innerHTML = `
        <div class="statistik-kort">
          <div class="statistik-siffra">${unikaArter.length}</div>
          <div class="statistik-label">Unika arter</div>
        </div>
        <div class="statistik-kort">
          <div class="statistik-siffra">${kommunSet.size}</div>
          <div class="statistik-label">Kommuner</div>
        </div>
        <div class="statistik-kort">
          <div class="statistik-siffra">${senastDatum}</div>
          <div class="statistik-label">Senaste fynd</div>
        </div>
      `;
      container.appendChild(statRad);

      // Rubrik
      const rubrik = document.createElement("div");
      rubrik.className = "arslista-header";
      rubrik.innerHTML = `
        <div class="arslista-titel">Sedda arter ${AR}</div>
        <div class="arslista-antal">${unikaArter.length} arter · sorterat på senast sedd</div>
      `;
      container.appendChild(rubrik);

      // Artlistans rader
      unikaArter.forEach((obs, i) => {
        const art    = obs.art.charAt(0).toUpperCase() + obs.art.slice(1);
        const plats  = obs.lokal || "Okänd plats";
        const d      = new Date(obs.datum);
        const datum  = d.toLocaleDateString("sv-SE", { day: "numeric", month: "short", year: "numeric" });
        const ny     = arNy(obs.datum);

        const rad = document.createElement("div");
        rad.className = "art-rad";
        rad.style.animationDelay = `${Math.min(i * 25, 500)}ms`;

        rad.innerHTML = `
          <div class="art-nummer">${i + 1}</div>
          <div class="art-namn-wrap">
            <div class="art-namn">
              ${art}
              ${ny ? `<span class="art-ny-badge">Ny</span>` : ""}
            </div>
            <div class="art-lat">${obs.scientificName}</div>
          </div>
          <div class="art-meta">
            <div class="art-datum">${datum}</div>
            <div class="art-plats">${plats}</div>
            <div><span class="art-kommune-pill">${obs.kommun || ""}</span></div>
          </div>
        `;

        container.appendChild(rad);
      });

      if (unikaArter.length === 0) {
        container.innerHTML = `<div class="loading-state">Inga fynd registrerade för ${AR} ännu.</div>`;
      }
    }

    window.addEventListener("DOMContentLoaded", byggArslista);
  </script>
</body>
</html>
