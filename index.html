<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fågelkollen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="a371670f-76e6-4271-865c-965e299f9459"></script>
</head>
<body>

  <header class="masthead">
    <div class="masthead-eyebrow">Artportalen · Småland · Högland</div>
    <h1>Fågel<em>kollen</em></h1>
    <div class="masthead-rule"></div>
    <div class="masthead-tagline">Fågelfynd från Eksjö &amp; omnejd</div>
  </header>

  <nav>
    <a href="#">🏠 Hem</a>
    <a href="aretslista.html">📋 Årets arter</a>
    <a href="info.html">ℹ️ Om</a>
  </nav>

  <div class="issue-line">
    <span>SENASTE OBSERVATIONER</span>
    <span id="issue-date">—</span>
  </div>

  <div class="filter-section">
    <span class="filter-label">Kommun</span>
    <div id="filter-row">
      <button class="filter-btn active" data-filter="Alla">Alla</button>
      <button class="filter-btn" data-filter="Eksjö">Eksjö</button>
      <button class="filter-btn" data-filter="Nässjö">Nässjö</button>
      <button class="filter-btn" data-filter="Aneby">Aneby</button>
      <button class="filter-btn" data-filter="Tranås">Tranås</button>
      <button class="filter-btn" data-filter="Vetlanda">Vetlanda</button>
    </div>
  </div>

  <main>
    <div id="fagellista">
      <div class="loading-state">Laddar observationer…</div>
    </div>
  </main>

  <footer>
    <div>&copy; 2025 Fågelkollen &nbsp;·&nbsp; Data via <a href="https://www.artportalen.se/" target="_blank" rel="noopener">Artportalen</a></div>
    <div class="footer-sub">Naturen är alltid nära.</div>
  </footer>

  <script>
    const KOMMUNFILTER = {
      "Alla":     null,
      "Eksjö":    "Eksjö",
      "Nässjö":   "Nässjö",
      "Aneby":    "Aneby",
      "Tranås":   "Tranås",
      "Vetlanda": "Vetlanda"
    };

    let allData = [];
    let activeFilter = "Alla";
    let currentAudio = null;
    let currentBtn   = null;

    document.getElementById("issue-date").textContent =
      new Date().toLocaleDateString("sv-SE", { day: "numeric", month: "long", year: "numeric" }).toUpperCase();

    function toggleSound(url, btn) {
      if (currentAudio && currentBtn === btn) {
        currentAudio.pause();
        currentAudio = null;
        currentBtn.classList.remove("playing");
        currentBtn.textContent = "♪ Lyssna";
        currentBtn = null;
        return;
      }
      if (currentAudio) {
        currentAudio.pause();
        currentBtn.classList.remove("playing");
        currentBtn.textContent = "♪ Lyssna";
      }
      currentAudio = new Audio(url);
      currentAudio.play().catch(() => {
        btn.classList.remove("playing");
        btn.textContent = "♪ Lyssna";
        currentAudio = null;
        currentBtn = null;
      });
      currentBtn = btn;
      btn.classList.add("playing");
      btn.textContent = "■ Stopp";
      currentAudio.addEventListener("ended", () => {
        btn.classList.remove("playing");
        btn.textContent = "♪ Lyssna";
        currentAudio = null;
        currentBtn = null;
      });
    }

    document.getElementById("filter-row").addEventListener("click", (e) => {
      if (!e.target.classList.contains("filter-btn")) return;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      activeFilter = e.target.dataset.filter;
      renderCards();
    });

    function renderCards() {
      document.querySelectorAll(".obs-card, .empty-state").forEach(el => el.remove());

      const container    = document.getElementById("fagellista");
      const kommunTarget = KOMMUNFILTER[activeFilter];
      const filtered     = kommunTarget
        ? allData.filter(o => o.kommun === kommunTarget)
        : allData;

      filtered.forEach((obs, i) => {
        const d        = new Date(obs.datum);
        const datumStr = d.toLocaleDateString("sv-SE", { day: "numeric", month: "long", year: "numeric" });
        const tidStr   = d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
        const art      = obs.art.charAt(0).toUpperCase() + obs.art.slice(1);
        const plats    = obs.lokal || "Okänd plats";

        const card = document.createElement("div");
        card.className = "obs-card";
        card.style.animationDelay = `${Math.min(i * 35, 400)}ms`;

        const locationHTML = obs.googleMapsLank
          ? `<a href="${obs.googleMapsLank}" target="_blank" rel="noopener noreferrer" class="obs-location-link">${plats}</a>`
          : plats;

        const countHTML = obs.antal > 1
          ? `<span class="obs-count-pill">${obs.antal} ind.</span>`
          : "";

        const soundHTML = obs.ljud
          ? `<button class="obs-sound-btn">♪ Lyssna</button>`
          : "";

        const imagePane = obs.bild
          ? `<div class="obs-image-pane">
               <a href="${obs.bild_lank}" target="_blank" rel="noopener">
                 <img src="${obs.bild}" alt="${art}" loading="lazy" />
               </a>
             </div>`
          : `<div class="obs-no-image">🐦</div>`;

        card.innerHTML = `
          <div class="obs-main">
            <div class="obs-species">${art}</div>
            <div class="obs-scientific">${obs.scientificName}</div>
            <div class="obs-meta">
              <span class="obs-meta-item">📍 ${locationHTML}</span>
              <span class="obs-kommune-pill">${obs.kommun || ""}</span>
              ${countHTML}
            </div>
            <div class="obs-meta">
              <span class="obs-meta-item">🗓 ${datumStr} &nbsp;${tidStr}</span>
            </div>
            ${soundHTML}
          </div>
          ${imagePane}
        `;

        if (obs.ljud) {
          const btn = card.querySelector(".obs-sound-btn");
          btn.addEventListener("click", () => toggleSound(obs.ljud, btn));
        }

        container.appendChild(card);
      });

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "loading-state empty-state";
        empty.textContent = "Inga fynd för vald kommun.";
        container.appendChild(empty);
      }
    }

    async function hamtaFaglar() {
      const res = await fetch("data/fagelfynd.json");
      allData   = await res.json();
      const container = document.getElementById("fagellista");
      container.innerHTML = "";

      // Kikaren
      try {
        const nyheterRes = await fetch("data/nyheter.json");
        const nyheter    = await nyheterRes.json();
        nyheter.sort((a, b) => new Date(b.datum) - new Date(a.datum));

        const kikaren = document.createElement("div");
        kikaren.className = "kikaren";

        const itemsHTML = nyheter.map(n => `
          <div class="kikaren-item">
            <strong>${n.datum}:</strong> ${n.titel}
            <a href="${n.lank}">Läs mer →</a>
          </div>
        `).join("");

        kikaren.innerHTML = `
          <div class="kikaren-icon-wrap">🔭</div>
          <div class="kikaren-body">
            <div class="kikaren-badge">Tipset</div>
            <div class="kikaren-title">Kikaren</div>
            ${itemsHTML}
          </div>
        `;
        container.appendChild(kikaren);
      } catch (e) { /* nyheter.json saknas */ }

      // Install hint
      const installHint = document.createElement("a");
      installHint.className = "install-hint";
      installHint.href   = "howto.html";
      installHint.target = "_blank";
      installHint.rel    = "noopener";
      installHint.innerHTML = `<span>📲</span> Lägg till på hemskärmen — instruktioner här`;
      container.appendChild(installHint);

      // Section head
      const sh = document.createElement("div");
      sh.className = "section-head";
      sh.innerHTML = `
        <div class="section-head-line section-head-line--left"></div>
        <div class="section-head-text">Senaste fynd</div>
        <div class="section-head-line section-head-line--right"></div>
      `;
      container.appendChild(sh);

      allData.sort((a, b) => new Date(b.datum) - new Date(a.datum));
      renderCards();
    }

    window.addEventListener("DOMContentLoaded", hamtaFaglar);
  </script>
</body>
</html>
